version: 2
updates:
  # NuGet packages across all projects in the solution.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    ignore:
      # FluentAssertions 7.x is the last free-for-OSS release; 8.x switched to
      # a paid Xceed commercial license. Stay on the 7.x line and stop
      # dependabot from re-proposing the 8.x major bump.
      - dependency-name: "FluentAssertions"
        versions: [">=8.0.0"]
    groups:
      avalonia:
        patterns:
          - "Avalonia*"
      naudio:
        patterns:
          - "NAudio*"
      silk-openal:
        patterns:
          - "Silk.NET.OpenAL*"
      efcore:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
      mvvm-toolkit:
        patterns:
          - "CommunityToolkit.Mvvm"
      ms-extensions:
        patterns:
          - "Microsoft.Extensions.*"

  # Pinned versions of GitHub Actions in the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
